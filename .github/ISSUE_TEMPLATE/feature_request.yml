name: 💡 Feature Request
  description: Suggest an idea for ValoonSync
  labels: [enhancement]
  body:
    - type: textarea
      id: problem
      attributes:
        label: What problem would this solve?
      validations:
        required: true
    - type: textarea
      id: solution
      attributes:
        label: Describe the solution you'd like
      validations:
        required: true
